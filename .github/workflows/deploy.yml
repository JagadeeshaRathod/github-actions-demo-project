name: Test Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare dist folder
        run: mkdir -p dist/logs

      - name: Copy config files (ignore if missing)
        run: |
          [ -f src/config.json ] && cp src/config.json dist/config.json || echo "config.json missing"
          cp package.json dist/package.json

      - name: Build project
        run: npm run build || true

      - name: Start the application
        run: |
          echo "Starting server..."
          npm start &
          sleep 5

      - name: Check server status
        run: curl -I http://localhost:3000 || exit 1

      - name: Show running node processes
        run: ps -ef | grep node
