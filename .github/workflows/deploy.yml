name: Test Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      # ✅ Start application
      - name: Start the application
        run: |
          echo "Starting server..."
          npm start &
          sleep 5

      # ✅ Check if server is running
      - name: Check server status
        run: |
          echo "Checking if server is listening on port 3000..."
          curl -I http://localhost:3000 || exit 1

      # ✅ Print logs for debugging
      - name: Show running node processes
        run: ps -ef | grep node
